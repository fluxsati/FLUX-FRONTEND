<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#b7ff00" />
      <stop offset="1" stop-color="#6effc8" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#061016" />
  <g transform="translate(60,40)">
    <rect x="0" y="0" rx="20" ry="20" width="680" height="370" fill="#0b0f11" stroke="#0f1720" stroke-width="2" />
    <g transform="translate(40,30)">
      <rect width="240" height="100" rx="12" fill="#071015" stroke="#102022" />
      <text x="18" y="60" font-family="Inter, Arial, sans-serif" font-size="28" fill="url(#g)" font-weight="700">MoodWave</text>

      <g transform="translate(320,6)">
        <circle cx="40" cy="40" r="36" fill="none" stroke="url(#g)" stroke-width="6" filter="url(#glow)" />
        <path d="M10 40 C30 10, 70 10, 90 40 C70 70, 30 70, 10 40 Z" fill="url(#g)" opacity="0.95" />
      </g>

      <g transform="translate(20,140)">
        <rect width="560" height="170" rx="10" fill="#03060a" stroke="#0e1620" />
        <text x="24" y="40" font-family="Courier New, monospace" font-size="16" fill="#9aa4ad">AI-Based emotion detection from text + face</text>
        <text x="24" y="72" font-family="Courier New, monospace" font-size="14" fill="#6f7a80">Generates mood-based playlist recommendations</text>
      </g>
    </g>
  </g>
</svg>
